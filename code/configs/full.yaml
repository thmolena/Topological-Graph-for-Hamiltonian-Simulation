# Reported-scale configuration. Larger systems (still exact-statevector
# tractable, n<=8) and more instances per family for tight confidence intervals.
# The step grid extends to r=24 so the high-accuracy (0.999) frontier is resolved
# for every schedule. Runtime is a few minutes on a multi-core laptop CPU (dense
# expm of a 2^8 x 2^8 reference per instance, plus the schedule sweep).
name: full
seed: 0
families: [tfim, heisenberg, molecular_like]
sizes: [4, 5, 6, 7, 8]
n_per_family: 8
time: 1.0
steps: 6
steps_grid: [1, 2, 4, 6, 8, 12, 16, 24]
targets: [0.9, 0.99, 0.999]
target_ref: 0.99
impotence_samples: 48
reference_backend: expm
