# Smoke / demo configuration: runs in a few seconds on a laptop CPU.
# Numbers from this config are demo-scale (small systems, few instances) -- the
# reported-scale numbers come from configs/full.yaml.
name: smoke
seed: 0
families: [tfim, heisenberg, molecular_like]
sizes: [3, 4]
n_per_family: 3
time: 1.0
steps: 4
steps_grid: [1, 2, 4, 6, 8, 12]
targets: [0.9, 0.99, 0.999]
target_ref: 0.99
impotence_samples: 24
reference_backend: expm
