# Reported-scale configuration. The matrix-free Krylov reference
# (expm_multiply on a matrix-free sparse Hamiltonian) extends the exact
# statevector benchmark from the old dense-expm ceiling (n<=8) to n=14, while the
# convergence-order doubling is shown to be size independent. Eight seeded
# instances per (family, size) give tight confidence intervals; the exact
# (dense) spectral-norm impotence sweep is capped at n<=8 (impotence_max_n), and
# the matrix-free collision/HS surrogate carries Theorem 1 at larger n. Runtime
# is a few minutes on a multi-core laptop CPU.
name: full
seed: 0
families: [tfim, heisenberg, molecular_like]
sizes: [4, 6, 8, 10, 12, 14]
n_per_family: 8
time: 1.0
steps: 6
steps_grid: [1, 2, 4, 6, 8, 12, 16, 24]
targets: [0.9, 0.99, 0.999]
target_ref: 0.99
impotence_samples: 48
impotence_max_n: 8
reference_backend: krylov
